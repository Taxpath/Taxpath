<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <h2>ICMAI</h2>
    <h3>CMA Rohit Chouhan</h3>
    <h4>CMA Final Group 3</h4>
    <button onclick="goToMCQ()" style="background:purple;color:white;padding:10px;margin:10px 0;border:none;border-radius:6px;">
    Practice MCQ
    </button>
</div>

<div class="countdown" id="countdown"></div>
<div class="pendingTotal" id="pendingTotal"></div>

<input type="text" id="subjectName" placeholder="Subject Name">
<input type="number" id="totalClasses" placeholder="Total Classes">

<input type="text" id="startDate" placeholder="Start Date"
    onfocus="this.type='date'" onblur="if(!this.value)this.type='text'">

<input type="text" id="endDate" placeholder="End Date"
    onfocus="this.type='date'" onblur="if(!this.value)this.type='text'">

<button onclick="addSubject()">Add Subject</button>

<div id="list"></div>

<script src="app.js"></script>

</body>
</html>
